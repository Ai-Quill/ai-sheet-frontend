  ============================================
  SIDEBAR_AGENT_FORMULA - Formula Handling Module
  ============================================
  
  Handles formula-first evaluation UI and formula application:
  - Decision transparency (why formula vs AI)
  - Formula option display and actions
  - Formula application to spreadsheet
  
  Included by: Sidebar.html (before Sidebar_Agent_Execution)
  Dependencies: escapeHtml, addAgentMessage, removeThinkingMessage, autoScrollMessages
-->

<script>
// ============================================
// DECISION TRANSPARENCY UI
// ============================================

/**
 * Render the FormulaFirst decision feedback
 * Shows users WHY a formula was or wasn't used
 * 
 * @param {Object} evalResult - Result from checkFormulaFirst
 * @param {Object} plan - Current execution plan
 * @param {boolean} isFormula - Whether formula is being used
 */
function renderDecisionFeedback(evalResult, plan, isFormula) {
  try {
    const explanation = evalResult?.explanation || 'Analyzing your data...';
    const taskType = plan?.taskType?.toLowerCase() || 'unknown';
  
  let feedbackHtml;
  
  if (isFormula) {
    // Show formula explanation - this is useful info
    feedbackHtml = `
      <div class="decision-feedback decision-formula animate-in" data-type="decision-feedback">
        <div class="decision-header">
          <span class="decision-icon">⚡</span>
          <span class="decision-title">Using Formula</span>
        </div>
        <p class="decision-explanation">${escapeHtml(explanation)}</p>
        <div class="decision-badges">
          <span class="decision-badge decision-badge-info">Auto-updates when data changes</span>
        </div>
      </div>
    `;
  } else {
    // Show what action is being performed, but NOT why AI was chosen over formula
    const taskLabels = {
      classify: 'Classifying',
      categorize: 'Categorizing', 
      summarize: 'Summarizing',
      translate: 'Translating',
      extract: 'Extracting',
      generate: 'Generating',
      score: 'Scoring',
      analyze: 'Analyzing',
      clean: 'Cleaning'
    };
    const actionLabel = taskLabels[taskType] || 'Processing';
    const rowCount = plan?.rowCount || '';
    const rowText = rowCount ? ` ${rowCount} rows` : '';
    
    feedbackHtml = `
      <div class="decision-feedback decision-ai animate-in" data-type="decision-feedback">
        <div class="decision-header">
          <span class="decision-icon">🤖</span>
          <span class="decision-title">${actionLabel}${rowText} with AI...</span>
        </div>
      </div>
    `;
  }
  
  // Remove any existing decision feedback
  const existingFeedback = document.querySelector('[data-type="decision-feedback"]');
  if (existingFeedback) {
    existingFeedback.remove();
  }
  
  // Insert before plan card or progress
  const messagesDiv = document.getElementById('agentMessages');
  const planCard = messagesDiv.querySelector('[data-type="plan"]');
  
  if (planCard) {
    planCard.insertAdjacentHTML('afterend', feedbackHtml);
  } else {
    messagesDiv.insertAdjacentHTML('beforeend', feedbackHtml);
  }
  
  autoScrollMessages();
  } catch (err) {
    console.warn('renderDecisionFeedback error:', err);
    // Don't crash - decision feedback is informational, not critical
  }
}

/**
 * Get contextual tip based on task type
 * Helps users understand how to get formula-based results next time
 */
function getDecisionTip(taskType, plan) {
  const tips = {
    classify: 'For faster results, try adding numeric thresholds (e.g., "size > 1000 = Hot, size > 100 = Warm").',
    categorize: 'For faster results, try adding numeric thresholds (e.g., "size > 1000 = Hot, size > 100 = Warm").',
    extract: 'Simple patterns like emails, URLs, phone numbers can be extracted instantly with formulas.',
    summarize: 'AI is best for understanding context. Consider shorter summaries for faster processing.',
    translate: 'Translation requires AI understanding. Google Sheets GOOGLETRANSLATE formula is an alternative.',
    score: 'For numeric scoring, consider defining clear thresholds that can be formula-based.',
    generate: 'AI generation creates unique content. For templates, consider using CONCATENATE formulas.'
  };
  
  return tips[taskType] || 'AI processing is best for tasks requiring semantic understanding.';
}

/**
 * Remove decision feedback when execution completes or plan changes
 */
function removeDecisionFeedback() {
  const feedback = document.querySelector('[data-type="decision-feedback"]');
  if (feedback) {
    feedback.style.opacity = '0';
    feedback.style.transform = 'translateY(-8px)';
    setTimeout(() => feedback.remove(), 200);
  }
}

// ============================================
// FORMULA OPTION UI
// ============================================

/**
 * Show formula option when formula is available
 */
function showFormulaOption(result, originalInput, context) {
  const formula = result.formula;
  const plan = result.plan;
  
  currentPlan = plan;
  currentPlan.originalCommand = originalInput;
  currentPlan._formulaData = formula;
  
  const messageHtml = `
    <div class="card p-2" data-type="formula-option" id="formulaCard">
      <div class="flex gap-2 mb-2">
        <span class="text-lg">🧮</span>
        <div class="flex-1">
          <p class="text-[11px] font-medium text-gray-700">${escapeHtml(formula.description)}</p>
          <p class="text-[11px] text-gray-500 mt-0.5">${formula.inputColumn}${formula.startRow}:${formula.inputColumn}${formula.endRow} → column ${formula.outputColumn} (${formula.rowCount} rows)</p>
        </div>
      </div>
      
      <div class="bg-green-50 border border-green-200 rounded p-2 mb-2" id="formulaStatus">
        <div class="flex items-center gap-2">
          <span class="text-green-600 text-sm">⚡</span>
          <div class="flex-1">
            <p class="text-[11px] font-medium text-green-700">Formula available</p>
            <div class="text-[11px] text-green-600 font-mono bg-green-100 rounded px-1.5 py-0.5 mt-1">${escapeHtml(formula.template)}</div>
          </div>
        </div>
      </div>
      
      <div class="flex gap-1.5" id="formulaActions">
        <button onclick="applyFormulaDirectly()" class="btn btn-primary btn-sm flex-1">
          ⚡ Apply Formula
        </button>
        <button onclick="useAIInstead()" class="btn btn-outline btn-sm text-[11px]" title="Use AI processing instead">
          🤖 AI
        </button>
      </div>
    </div>
  `;
  
  removeThinkingMessage();
  const messagesDiv = document.getElementById('agentMessages');
  messagesDiv.insertAdjacentHTML('beforeend', messageHtml);
  autoScrollMessages();
}

// ============================================
// FORMULA APPLICATION
// ============================================

/**
 * Apply formula directly without AI
 */
let isApplyingFormula = false; // Prevent double-click

function applyFormulaDirectly() {
  // Double-click protection
  if (isApplyingFormula) {
    console.log('Formula application already in progress, ignoring');
    return;
  }
  
  if (!currentPlan?._formulaData) {
    addAgentMessage('error', 'No formula data available');
    return;
  }
  
  isApplyingFormula = true;
  
  const formula = currentPlan._formulaData;
  const statusEl = document.getElementById('formulaStatus');
  const actionsEl = document.getElementById('formulaActions');
  
  if (statusEl) {
    statusEl.innerHTML = `
      <div class="flex items-center gap-2">
        <div class="w-5 h-5 border-2 border-blue-300 border-t-blue-600 rounded-full animate-spin"></div>
        <span class="text-[11px] text-blue-700 font-medium">Applying formula...</span>
      </div>
    `;
    statusEl.className = 'bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-200 rounded-lg p-3 shadow-sm mb-2';
  }
  
  if (actionsEl) {
    actionsEl.style.display = 'none';
  }
  
  google.script.run
    .withSuccessHandler(function(result) {
      if (statusEl) {
        statusEl.innerHTML = `
          <div class="flex items-center gap-2 mb-2">
            <div class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center">
              <span class="text-white text-sm">✓</span>
            </div>
            <div class="flex-1">
              <span class="text-[11px] text-green-700 font-semibold">Formula Applied!</span>
              <span class="text-[11px] text-gray-500 ml-2">${formula.inputColumn}${formula.startRow}:${formula.inputColumn}${formula.endRow} → ${formula.outputColumn}</span>
            </div>
          </div>
          <div class="bg-white/70 rounded px-2 py-1.5 mb-2">
            <code class="text-[11px] text-green-700 font-mono break-all">${escapeHtml(formula.template)}</code>
          </div>
          <p class="text-[11px] text-green-600">✨ ${result.rowCount} rows updated</p>
        `;
        statusEl.className = 'bg-gradient-to-br from-green-50 to-emerald-50 border border-green-200 rounded-lg p-3 shadow-sm mb-2';
      }
      
      saveTaskToHistory({
        command: currentPlan.originalCommand,
        type: 'formula',
        inputRange: `${formula.inputColumn}${formula.startRow}:${formula.inputColumn}${formula.endRow}`,
        outputColumn: formula.outputColumn,
        formula: formula.template,
        rowCount: result.rowCount
      });
      
      currentPlan = null;
      isApplyingFormula = false;
      setExecuting(false);
    })
    .withFailureHandler(function(err) {
      isApplyingFormula = false;
      
      if (statusEl) {
        statusEl.innerHTML = `
          <div class="flex items-center gap-2 mb-2">
            <div class="w-6 h-6 rounded-full bg-red-500 flex items-center justify-center">
              <span class="text-white text-sm">✕</span>
            </div>
            <span class="text-[11px] text-red-700 font-semibold">Formula Failed</span>
          </div>
          <p class="text-[11px] text-red-600 mb-2">${escapeHtml(err.message)}</p>
          <button onclick="useAIInstead()" class="w-full text-[11px] font-medium px-3 py-1.5 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors shadow-sm">🤖 Use AI Instead</button>
        `;
        statusEl.className = 'bg-gradient-to-br from-red-50 to-rose-50 border border-red-200 rounded-lg p-3 shadow-sm mb-2';
      }
      
      if (actionsEl) {
        actionsEl.style.display = 'flex';
      }
      setExecuting(false);
    })
    .applyFormulaToRange(
      formula.template, 
      formula.inputColumn, 
      formula.outputColumn, 
      formula.startRow, 
      formula.endRow
    );
}

/**
 * Apply formula directly (no confirmation needed - better UX)
 */
function applyFormulaDirectFromPlan() {
  executeConditionalFormula();
}

/**
 * Execute conditional formula
 */
function executeConditionalFormula() {
  // Double-click protection (reuse the same flag)
  if (isApplyingFormula) {
    console.log('Formula application already in progress, ignoring');
    return;
  }
  
  if (!currentPlan?._formulaOption) {
    addAgentMessage('error', 'No formula data available');
    return;
  }
  
  isApplyingFormula = true;
  
  const formula = currentPlan._formulaOption;
  const container = document.getElementById('formulaOptionContainer');
  
  if (container) {
    container.innerHTML = `
      <div class="bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-200 rounded-lg p-3 shadow-sm">
        <div class="flex items-center gap-2">
          <div class="w-5 h-5 border-2 border-blue-300 border-t-blue-600 rounded-full animate-spin"></div>
          <span class="text-[11px] text-blue-700 font-medium">Applying formula...</span>
        </div>
      </div>
    `;
  }
  
  google.script.run
    .withSuccessHandler(function(result) {
      if (container) {
        container.innerHTML = `
          <div class="bg-gradient-to-br from-green-50 to-emerald-50 border border-green-200 rounded-lg p-3 shadow-sm">
            <div class="flex items-center gap-2 mb-2">
              <div class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center">
                <span class="text-white text-sm">✓</span>
              </div>
              <span class="text-[11px] text-green-700 font-semibold">Formula Applied!</span>
            </div>
            <div class="bg-white/70 rounded px-2 py-1.5 mb-2">
              <code class="text-[11px] text-green-700 font-mono break-all">${escapeHtml(formula.template)}</code>
            </div>
            <p class="text-[11px] text-green-600">✨ ${result.rowCount} rows updated</p>
          </div>
        `;
      }
      
      const actionButtons = document.getElementById('planActionButtons');
      if (actionButtons) {
        actionButtons.style.display = 'none';
      }
      
      saveTaskToHistory({
        command: currentPlan.originalCommand,
        type: 'formula-conditional',
        inputRange: `${formula.inputColumn}${formula.startRow}:${formula.inputColumn}${formula.endRow}`,
        outputColumn: formula.outputColumn,
        formula: formula.template,
        rowCount: result.rowCount
      });
      
      currentPlan = null;
      isApplyingFormula = false;
      setExecuting(false);
    })
    .withFailureHandler(function(err) {
      isApplyingFormula = false;
      
      if (container) {
        container.innerHTML = `
          <div class="bg-gradient-to-br from-red-50 to-rose-50 border border-red-200 rounded-lg p-3 shadow-sm">
            <div class="flex items-center gap-2 mb-2">
              <div class="w-6 h-6 rounded-full bg-red-500 flex items-center justify-center">
                <span class="text-white text-sm">✕</span>
              </div>
              <span class="text-[11px] text-red-700 font-semibold">Formula Failed</span>
            </div>
            <p class="text-[11px] text-red-600 mb-2">${escapeHtml(err.message)}</p>
            <button onclick="useAIInstead()" class="w-full text-[11px] font-medium px-3 py-1.5 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors shadow-sm">
              🤖 Use AI Instead (more robust)
            </button>
          </div>
        `;
      }
      setExecuting(false);
    })
    .applyFormulaToRange(
      formula.template, 
      formula.inputColumn, 
      formula.outputColumn, 
      formula.startRow, 
      formula.endRow
    );
}

/**
 * Legacy function - now applies formula directly (better UX)
 */
function tryConditionalFormula() {
  applyFormulaDirectFromPlan();
}

/**
 * User chose to use AI instead of formula
 */
function useAIInstead() {
  if (!currentPlan) {
    addAgentMessage('error', 'No plan available');
    return;
  }
  
  const formulaCard = document.querySelector('[data-type="formula-option"]');
  if (formulaCard) formulaCard.remove();
  
  const selectedModel = document.getElementById('agentModelSelect')?.value || 'GEMINI';
  currentPlan.model = selectedModel;
  
  fetchCostEstimate(currentPlan, function(estimate) {
    currentPlan.estimate = estimate;
    addAgentMessage('plan', currentPlan);
    // Trigger format update if auto-populated
    if (currentPlan.formatHint) {
      setTimeout(function() { updatePlanFormat(currentPlan.formatHint); }, 50);
    }
  });
}

/**
 * Use a spreadsheet formula instead of AI
 */
function useFormulaAlternative(formulaTemplate) {
  if (!currentPlan) return;
  
  const inputRange = currentPlan.inputRange;
  const outputCol = currentPlan.outputColumns?.[0] || 'C';
  
  const rangeMatch = inputRange.match(/([A-Z]+)(\d+):([A-Z]+)(\d+)/i);
  if (!rangeMatch) {
    addAgentMessage('error', 'Could not parse input range');
    return;
  }
  
  const inputCol = rangeMatch[1];
  const startRow = parseInt(rangeMatch[2]);
  const endRow = parseInt(rangeMatch[4]);
  
  addAgentMessage('thinking', 'Applying formula...');
  
  google.script.run
    .withSuccessHandler(function(result) {
      removeThinkingMessage();
      addAgentMessage('complete', `✨ Formula applied to ${result.rowCount} rows`);
      
      saveTaskToHistory({
        command: currentPlan.originalCommand,
        type: 'formula',
        inputRange: inputRange,
        outputColumn: outputCol,
        formula: formulaTemplate,
        rowCount: result.rowCount
      });
    })
    .withFailureHandler(function(err) {
      removeThinkingMessage();
      addAgentMessage('error', 'Formula failed: ' + err.message);
    })
    .applyFormulaToRange(formulaTemplate, inputCol, outputCol, startRow, endRow);
}

// ============================================
// MODULE LOADED
// ============================================

console.log('📦 Agent Formula module loaded');
</script>
