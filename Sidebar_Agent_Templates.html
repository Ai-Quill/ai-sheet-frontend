// ============================================
// TEMPLATE PANEL
// ============================================

let templatesPanelOpen = false;

/**
 * Toggle templates panel
 */
function toggleTemplatesPanel() {
  templatesPanelOpen = !templatesPanelOpen;
  
  if (templatesPanelOpen) {
    renderTemplatesPanel();
  } else {
    closeTemplatesPanel();
  }
  
  if (typeof logActionEvent === 'function') {
    logActionEvent('templates_toggle', templatesPanelOpen ? 'open' : 'close');
  }
}

/**
 * Render templates panel
 */
function renderTemplatesPanel() {
  // Group by category
  const categories = {};
  AGENT_TEMPLATES.forEach(t => {
    if (!categories[t.category]) categories[t.category] = [];
    categories[t.category].push(t);
  });
  
  // Build popular templates
  const popular = AGENT_TEMPLATES.filter(t => t.popular);
  const popularHtml = popular.map(t => renderTemplateCard(t, true)).join('');
  
  // Build category sections
  const categoriesHtml = Object.entries(categories).map(([cat, templates]) => `
    <div class="mb-4">
      <div class="text-[11px] uppercase tracking-wide text-gray-500 mb-2">${cat}</div>
      <div class="grid grid-cols-1 gap-2">
        ${templates.map(t => renderTemplateCard(t)).join('')}
      </div>
    </div>
  `).join('');
  
  const html = `
    <div class="templates-panel fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm" 
         onclick="closeTemplatesPanel()" data-type="templates-overlay">
      <div class="bg-white rounded-2xl shadow-2xl w-[95%] max-w-lg max-h-[85vh] overflow-hidden flex flex-col"
           onclick="event.stopPropagation()">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white p-4">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-xl">📋</span>
              <span class="font-semibold">Workflow Templates</span>
            </div>
            <button onclick="closeTemplatesPanel()" class="text-white/80 hover:text-white text-lg">✕</button>
          </div>
          <p class="text-[11px] text-white/80 mt-1">
            Pre-built workflows for common tasks. Click to apply.
          </p>
        </div>
        
        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-4">
          
          <!-- Popular -->
          <div class="mb-4">
            <div class="text-[11px] uppercase tracking-wide text-amber-600 mb-2 flex items-center gap-1">
              ⭐ Popular Templates
            </div>
            <div class="grid grid-cols-1 gap-2">
              ${popularHtml}
            </div>
          </div>
          
          <!-- All Categories -->
          ${categoriesHtml}
          
        </div>
        
        <!-- Footer -->
        <div class="border-t border-gray-100 p-3 bg-gray-50 text-center">
          <span class="text-[11px] text-gray-500">
            💡 Templates are starting points — customize as needed
          </span>
        </div>
        
      </div>
    </div>
  `;
  
  document.body.insertAdjacentHTML('beforeend', html);
}

/**
 * Render a single template card
 */
function renderTemplateCard(template, isPopular = false) {
  const stepsHtml = template.steps ? template.steps.slice(0, 3).map((s, i) => 
    `<span class="text-[11px] text-gray-400">${i + 1}. ${s}</span>`
  ).join(' → ') : '';
  
  return `
    <div class="template-card bg-gray-50 hover:bg-indigo-50 border border-gray-100 hover:border-indigo-200 rounded-xl p-3 cursor-pointer transition-all"
         onclick="applyTemplate('${template.id}')">
      <div class="flex items-start gap-2">
        <span class="text-lg">${template.icon}</span>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="text-[12px] font-semibold text-gray-800">${template.name}</span>
            ${isPopular ? '<span class="text-[8px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-full">Popular</span>' : ''}
          </div>
          <div class="text-[11px] text-gray-500 mt-0.5">${template.description}</div>
          ${stepsHtml ? `<div class="mt-1.5 flex flex-wrap gap-1">${stepsHtml}</div>` : ''}
        </div>
        <span class="text-indigo-500 text-[11px] font-medium">Use →</span>
      </div>
    </div>
  `;
}

/**
 * Close templates panel
 */
function closeTemplatesPanel() {
  templatesPanelOpen = false;
  const overlay = document.querySelector('[data-type="templates-overlay"]');
  if (overlay) overlay.remove();
}

/**
 * Apply a template
 */
function applyTemplate(templateId) {
  const template = AGENT_TEMPLATES.find(t => t.id === templateId);
  if (!template) return;
  
  closeTemplatesPanel();
  
  // Track event
  if (typeof logActionEvent === 'function') {
    logActionEvent('template_apply', templateId);
  }
  
  // Set command in input
  const input = document.getElementById('agentInput');
  if (input) {
    input.value = template.command;
    input.focus();
  }
  
  showToast(`Template loaded: ${template.name}`, 'success');
}
