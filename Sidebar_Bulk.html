<script>
// ============================================
// BULK AGENT STATE
// ============================================

let currentJobId = null;
let pollInterval = null;
let bulkJobConfig = {};
let lastWrittenIndex = -1;

// ============================================
// MAIN ENTRY POINT
// ============================================

function showBulkAgent() {
  setActiveTab('tab-bulk');
  
  // Check for active jobs first
  google.script.run
    .withSuccessHandler(function(activeJobInfo) {
      if (activeJobInfo.hasActiveJob) {
        renderResumePanel(activeJobInfo.job);
      } else {
        renderBulkForm();
      }
    })
    .withFailureHandler(function() {
      renderBulkForm();
    })
    .checkActiveJobs();
}

// ============================================
// RESUME PANEL (for interrupted jobs)
// ============================================

          <div>

}

// ============================================
// SMART AUTO-DETECTION
// ============================================

function detectSelection() {
  google.script.run
    .withSuccessHandler(function(info) {
      if (info.hasSelection && info.hasData) {
        document.getElementById('inputRange').value = info.range;
        document.getElementById('outputColumn').value = info.suggestedOutput;
        document.getElementById('rangeInfo').innerHTML = 
          '<span class="text-green-600">✓ ' + info.rowCount + ' rows detected</span> → Output: ' + info.suggestedOutput;
      } else if (info.hasSelection) {
        document.getElementById('inputRange').value = info.range;
        document.getElementById('rangeInfo').innerHTML = 
          '<span class="text-amber-600">⚠️ Selection is empty</span>';
      } else {
        document.getElementById('rangeInfo').innerHTML = 
          '<span class="text-gray-500">Select cells in sheet, then click Auto-detect</span>';
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('rangeInfo').innerHTML = 
        '<span class="text-red-500">Detection failed: ' + err.message + '</span>';
    })
    .getSelectedRange();
}

// ============================================
// PREVIEW MODE
// ============================================

function runPreview() {
  const inputRange = document.getElementById('inputRange').value;
  const prompt = document.getElementById('promptTemplate').value;
  const model = document.getElementById('bulkModel').value;
  const outputColumn = document.getElementById('outputColumn').value;
  
  // Validate
  if (!inputRange) {
    showToast('Please enter or detect an input range', 'error');
    return;
  }
  if (!prompt) {
    showToast('Please enter a prompt template', 'error');
    return;
  }
  if (!outputColumn) {
    showToast('Please enter an output column', 'error');
    return;
  }
  
  // Show preview panel with loading state
  document.getElementById('bulkForm').classList.add('hidden');
  renderPreviewLoading();
  
  // Store config
  bulkJobConfig = { inputRange, prompt, model, outputColumn };
  
  // Run preview
  google.script.run
    .withSuccessHandler(displayPreviewResults)
    .withFailureHandler(function(err) {
      renderPreviewError(err.message);
    })
    .previewBulkJob(inputRange, prompt, model, null, 3);
}

function renderPreviewLoading() {
  document.getElementById('previewPanel').classList.remove('hidden');
  document.getElementById('previewPanel').innerHTML = `
    <div class="card p-3">
      <div class="flex items-center justify-between mb-3">
        <h4 class="font-medium text-xs">👀 Preview Results</h4>
        <span class="badge badge-secondary text-[11px]">Processing...</span>
      </div>
      <div class="space-y-2">
        <div class="skeleton h-12 rounded"></div>
        <div class="skeleton h-12 rounded"></div>
        <div class="skeleton h-12 rounded"></div>
      </div>
    </div>
  `;
}

function renderPreviewError(message) {
  document.getElementById('previewPanel').innerHTML = `
    <div class="card p-3">
      <div class="flex items-center justify-between mb-3">
        <h4 class="font-medium text-xs">👀 Preview Results</h4>
        <span class="badge bg-red-100 text-red-600 text-[11px]">Error</span>
      </div>
      <div class="text-red-600 text-xs">${message}</div>
      <button onclick="editPrompt()" class="btn btn-outline w-full mt-3">← Back to Edit</button>
    </div>
  `;
}

function displayPreviewResults(result) {
  const status = result.allSuccessful ? 
    '<span class="badge bg-green-100 text-green-600 text-[11px]">✓ All passed</span>' :
    '<span class="badge bg-amber-100 text-amber-600 text-[11px]">' + result.successCount + '/' + result.previewCount + ' passed</span>';
  
  let previewsHtml = '';
  result.previews.forEach(function(p) {
    const bgColor = p.success ? 'bg-green-50' : 'bg-red-50';
    const borderColor = p.success ? 'border-green-200' : 'border-red-200';
    previewsHtml += `
      <div class="${bgColor} border ${borderColor} rounded p-2 text-[11px]">
        <div class="font-medium text-gray-700 truncate">Input: ${p.input}</div>
        <div class="text-gray-600 mt-1 ${p.success ? '' : 'text-red-600'}">
          ${p.success ? '→ ' + p.output : '❌ ' + p.error}
        </div>
      </div>
    `;
  });
  
  document.getElementById('previewPanel').innerHTML = `
    <div class="card p-3">
      <div class="flex items-center justify-between mb-3">
        <h4 class="font-medium text-xs">👀 Preview Results</h4>
        ${status}
      </div>
      <div id="previewResults" class="space-y-2 max-h-48 overflow-y-auto">
        ${previewsHtml}
      </div>
      <div class="mt-3 p-2 bg-gray-50 rounded text-xs">
        <div class="flex justify-between">
          <span>Total rows:</span>
          <span class="font-medium">${result.totalRows}</span>
        </div>
        <div class="flex justify-between">
          <span>Estimated cost:</span>
          <span class="font-medium text-blue-600">$${result.estimatedCost.estimatedCost}</span>
        </div>
      </div>
      <div class="mt-3 flex gap-2">
        <button onclick="editPrompt()" class="btn btn-outline flex-1">
          ✏️ Edit Prompt
        </button>
        <button onclick="startBulkJob()" class="btn btn-primary flex-1">
          ▶️ Process All
        </button>
      </div>
    </div>
  `;
  
  bulkJobConfig.rowCount = result.totalRows;
  bulkJobConfig.startRow = 2;
}

function editPrompt() {
  document.getElementById('previewPanel').classList.add('hidden');
  document.getElementById('bulkForm').classList.remove('hidden');
}

// ============================================
// JOB EXECUTION
// ============================================

function startBulkJob() {
  if (!bulkJobConfig.inputRange) {
    showToast('Please run preview first', 'error');
    return;
  }
  
  // Hide form/preview, show progress
  document.getElementById('bulkForm').classList.add('hidden');
  document.getElementById('previewPanel').classList.add('hidden');
  renderProgressPanel();
  
  lastWrittenIndex = -1;
  
  // Get input values and create job
  google.script.run
    .withSuccessHandler(function(inputData) {
      google.script.run
        .withSuccessHandler(function(result) {
          currentJobId = result.id;
          bulkJobConfig.totalRows = result.totalRows;
          showToast('Job started! Results will appear live.', 'success');
          startPolling();
        })
        .withFailureHandler(function(err) {
          showToast('Failed to create job: ' + err.message, 'error');
          document.getElementById('jobProgress').classList.add('hidden');
          document.getElementById('bulkForm').classList.remove('hidden');
        })
        .createBulkJob(inputData, bulkJobConfig.prompt, bulkJobConfig.model);
    })
    .withFailureHandler(function(err) {
      showToast('Failed to read range: ' + err.message, 'error');
      document.getElementById('jobProgress').classList.add('hidden');
      document.getElementById('bulkForm').classList.remove('hidden');
    })
    .getRangeValues(bulkJobConfig.inputRange);
}

function renderProgressPanel() {
  document.getElementById('jobProgress').classList.remove('hidden');
  document.getElementById('jobProgress').innerHTML = `
    <div class="card p-3 bg-blue-50">
      <div class="flex justify-between items-center mb-2">
        <span class="font-medium text-xs">Processing...</span>
        <span id="progressPercent" class="text-xs font-bold">0%</span>
      </div>
      <div class="progress">
        <div id="progressBar" class="progress-bar transition-all duration-300"></div>
      </div>
      <div class="mt-2 grid grid-cols-3 gap-2 text-center text-[11px]">
        <div>
          <div id="successCount" class="font-bold text-green-600">0</div>
          <div class="text-gray-500">Success</div>
        </div>
        <div>
          <div id="processingCount" class="font-bold text-blue-600">0</div>
          <div class="text-gray-500">Processing</div>
        </div>
        <div>
          <div id="errorCount" class="font-bold text-red-600">0</div>
          <div class="text-gray-500">Errors</div>
        </div>
      </div>
      <p id="progressStatus" class="text-[11px] text-gray-600 mt-2 text-center">Initializing...</p>
    </div>
    <button onclick="cancelCurrentJob()" class="btn btn-destructive w-full mt-2">
      ❌ Cancel Job
    </button>
  `;
}

// ============================================
// POLLING & PROGRESS
// ============================================

function startPolling() {
  pollInterval = setInterval(function() {
    google.script.run
      .withSuccessHandler(updateProgress)
      .withFailureHandler(function(err) {
        console.error('Polling error:', err);
      })
      .getJobStatus(currentJobId);
  }, 2000);
}

function updateProgress(job) {
  const percent = job.progress || 0;
  document.getElementById('progressPercent').textContent = percent + '%';
  document.getElementById('progressBar').style.width = percent + '%';
  
  const successCount = job.successCount || job.processedRows || 0;
  const errorCount = job.errorCount || 0;
  const remaining = (job.totalRows || 0) - successCount - errorCount;
  
  document.getElementById('successCount').textContent = successCount;
  document.getElementById('processingCount').textContent = remaining > 0 ? remaining : 0;
  document.getElementById('errorCount').textContent = errorCount;
  document.getElementById('progressStatus').textContent = 
    job.processedRows + '/' + job.totalRows + ' rows • ' + job.status;
  
  // Incremental write results
  if (job.results && job.results.length > 0) {
    writeIncrementalResults(job.results);
  }
  
  if (job.status === 'completed' || job.status === 'failed' || job.status === 'cancelled') {
    clearInterval(pollInterval);
    renderJobComplete(job);
  }
}

function writeIncrementalResults(results) {
  google.script.run
    .withSuccessHandler(function() {})
    .writeIncrementalResults(
      currentJobId, 
      results, 
      bulkJobConfig.outputColumn, 
      bulkJobConfig.startRow || 2,
      true
    );
}

// ============================================
// JOB COMPLETE
// ============================================

function renderJobComplete(job) {
  document.getElementById('jobProgress').classList.add('hidden');
  document.getElementById('jobComplete').classList.remove('hidden');
  
  const hasErrors = (job.errorCount || 0) > 0;
  const successCount = job.successCount || job.processedRows || 0;
  
  let errorDetailsHtml = '';
  if (hasErrors && job.errors && job.errors.length > 0) {
    let errorListHtml = '';
    job.errors.slice(0, 10).forEach(function(e) {
      errorListHtml += '<div class="p-1 bg-red-50 rounded">Row ' + (e.rowIndex + 2) + ': ' + e.error + '</div>';
    });
    if (job.errors.length > 10) {
      errorListHtml += '<div class="text-gray-500">...and ' + (job.errors.length - 10) + ' more</div>';
    }
    errorDetailsHtml = `
      <div class="card p-3 mt-2">
        <h4 class="font-medium text-xs mb-2 text-red-600">❌ Failed Rows</h4>
        <div class="space-y-1 max-h-32 overflow-y-auto text-[11px]">${errorListHtml}</div>
        <button onclick="retryFailed()" class="btn btn-secondary w-full mt-2">🔄 Retry Failed Rows</button>
      </div>
    `;
  }
  
  const cardClass = hasErrors ? 'bg-amber-50' : 'bg-green-50';
  const icon = hasErrors ? '⚠️' : '✅';
  const title = hasErrors ? 'Completed with Errors' : 'Job Complete!';
  const message = hasErrors 
    ? successCount + ' succeeded, ' + job.errorCount + ' failed'
    : 'Processed ' + successCount + ' rows → Column ' + bulkJobConfig.outputColumn;
  
  document.getElementById('jobComplete').innerHTML = `
    <div class="card p-4 text-center ${cardClass}">
      <div class="text-3xl mb-2">${icon}</div>
      <h4 class="font-semibold text-sm">${title}</h4>
      <p class="text-xs text-gray-600 mt-1">${message}</p>
    </div>
    ${errorDetailsHtml}
    <div class="flex gap-2 mt-2">
      <button onclick="clearHighlights()" class="btn btn-outline flex-1">🎨 Clear Colors</button>
      <button onclick="showBulkAgent()" class="btn btn-primary flex-1">🔄 New Job</button>
    </div>
  `;
  
  bulkJobConfig.lastJobId = currentJobId;
  currentJobId = null;
}

// ============================================
// JOB ACTIONS
// ============================================

function retryFailed() {
  const jobId = currentJobId || bulkJobConfig.lastJobId;
  if (!jobId) {
    showToast('No job to retry', 'error');
    return;
  }
  
  google.script.run
    .withSuccessHandler(function(result) {
      currentJobId = jobId;
      showToast('Retrying ' + result.retriedCount + ' rows...', 'success');
      document.getElementById('jobComplete').classList.add('hidden');
      renderProgressPanel();
      startPolling();
    })
    .withFailureHandler(function(err) {
      showToast('Retry failed: ' + err.message, 'error');
    })
    .retryFailedRows(jobId);
}

function cancelCurrentJob() {
  if (!currentJobId) return;
  clearInterval(pollInterval);
  
  google.script.run
    .withSuccessHandler(function() {
      showToast('Job cancelled', 'success');
      document.getElementById('jobProgress').classList.add('hidden');
      document.getElementById('bulkForm').classList.remove('hidden');
      currentJobId = null;
    })
    .withFailureHandler(function(err) {
      showToast('Failed to cancel: ' + err.message, 'error');
    })
    .cancelJob(currentJobId);
}

function cancelAndNew(jobId) {
  google.script.run
    .withSuccessHandler(function() {
      renderBulkForm();
    })
    .cancelJob(jobId);
}

function resumeJob(jobId) {
  currentJobId = jobId;
  renderProgressPanel();
  startPolling();
}

function clearHighlights() {
  google.script.run
    .withSuccessHandler(function() {
      showToast('Highlights cleared', 'success');
    })
    .clearResultHighlights(bulkJobConfig.outputColumn, bulkJobConfig.startRow || 2, bulkJobConfig.rowCount || 100);
}

    name: 'Clean',
    icon: '🧹',
    prompt: 'Clean this text by:\n- Removing extra whitespace\n- Fixing capitalization\n- Removing unwanted suffixes (Ltd, Inc, LLC)\n- Standardizing format\n\nInput: {{input}}\n\nCleaned:',
    model: 'GROQ',
    config: null
  },
  custom: {
    name: 'Custom',
    icon: '✨',
    prompt: '',
    model: 'GEMINI',
    config: null
  }
};

let selectedTask = 'custom';

function selectTask(taskId) {
  selectedTask = taskId;
  const task = TASK_TEMPLATES[taskId];
  
  // Update UI - highlight selected
  document.querySelectorAll('.task-btn').forEach(btn => {
    btn.classList.remove('active', 'bg-blue-50', 'border-blue-300');
  });
  const selectedBtn = document.querySelector(`[data-task="${taskId}"]`);
  if (selectedBtn) {
    selectedBtn.classList.add('active', 'bg-blue-50', 'border-blue-300');
  }
  
  // Update prompt if not custom
  if (taskId !== 'custom' && task.prompt) {
    document.getElementById('promptTemplate').value = task.prompt;
  }
  
  // Update model recommendation
  if (task.model) {
    document.getElementById('bulkModel').value = task.model;
    document.getElementById('modelRecommendation').textContent = '✓ Recommended for ' + task.name;
  }
  
  // Show task-specific config
  const configDiv = document.getElementById('taskConfig');
  if (task.config && task.config.showField) {
    configDiv.innerHTML = `
      <label class="font-medium">${task.config.fieldLabel}</label>
      <input type="text" id="taskConfigField" class="input mt-1" 
             placeholder="${task.config.fieldPlaceholder}"
             onchange="updatePromptWithConfig()">
    `;
    configDiv.classList.remove('hidden');
  } else {
    configDiv.classList.add('hidden');
  }
}

function updatePromptWithConfig() {
  const task = TASK_TEMPLATES[selectedTask];
  const configValue = document.getElementById('taskConfigField')?.value;
  
  if (!configValue || !task) return;
  
  let prompt = task.prompt;
  
  // Update prompt based on task type
  if (selectedTask === 'translate') {
    prompt = `Translate this text to ${configValue}. Keep brand names and proper nouns unchanged:\n\n{{input}}`;
  } else if (selectedTask === 'classify') {
    prompt = `Classify this text into ONE of these categories: [${configValue}]\n\nText: {{input}}\n\nCategory:`;
  } else if (selectedTask === 'extract') {
    prompt = `Extract ${configValue} from this text. Return only the extracted value(s), nothing else:\n\n{{input}}`;
  }
  
  document.getElementById('promptTemplate').value = prompt;
}

// ============================================
// HEADER READING
// ============================================

function readHeadersForPrompt() {
  google.script.run
    .withSuccessHandler(function(headers) {
      if (headers && headers.length > 0) {
        const headerList = headers.join(', ');
        const suggestion = `Based on the columns [${headerList}], process each row and:\n\n{{input}}`;
        document.getElementById('promptTemplate').value = suggestion;
        showToast('Headers detected: ' + headerList, 'success');
      } else {
        showToast('No headers found in row 1', 'error');
      }
    })
    .withFailureHandler(function(err) {
      showToast('Failed to read headers: ' + err.message, 'error');
    })
    .getSheetHeaders();
}

// ============================================
// UTILITIES
// ============================================

function timeAgo(dateString) {
  if (!dateString) return 'recently';
  const date = new Date(dateString);
  const now = new Date();
  const seconds = Math.floor((now - date) / 1000);
  
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return Math.floor(seconds / 60) + ' min ago';
  if (seconds < 86400) return Math.floor(seconds / 3600) + ' hours ago';
  return Math.floor(seconds / 86400) + ' days ago';
}
