// ============================================
// SETTINGS HELPERS
// ============================================

function loadUserSettings() {
  google.script.run
    .withSuccessHandler(function(settings) {
      populateSettingsForm(settings);
    })
    .withFailureHandler(function(err) {
      console.error('Error loading settings:', err);
    })
    .getUserSettings();
}

function populateSettingsForm(settings) {
  const models = ['CHATGPT', 'CLAUDE', 'GROQ', 'GEMINI'];
  models.forEach(model => {
    const lower = model.toLowerCase();
    if (settings[model]) {
      const keyInput = document.getElementById(`${lower}-key`);
      const modelSelect = document.getElementById(`${lower}-model`);
      if (keyInput) keyInput.value = settings[model].apiKey || '';
      if (modelSelect) modelSelect.value = settings[model].defaultModel || '';
    }
  });
}

function saveAllSettings() {
  const models = ['CHATGPT', 'CLAUDE', 'GROQ', 'GEMINI'];
  let settings = {};

  models.forEach(model => {
    const lower = model.toLowerCase();
    settings[model] = {
      apiKey: document.getElementById(`${lower}-key`)?.value || '',
      defaultModel: document.getElementById(`${lower}-model`)?.value || ''
    };
  });

  google.script.run
    .withSuccessHandler(function() {
      showToast('Settings saved!', 'success');
    })
    .withFailureHandler(function(err) {
      showToast('Failed to save settings', 'error');
    })
    .saveAllSettings(settings);
}

function fetchModels() {
  google.script.run
    .withSuccessHandler(function(models) {
      populateModelDropdowns(models);
    })
    .withFailureHandler(function(err) {
      console.error('Error fetching models:', err);
    })
    .fetchModels();
}

function populateModelDropdowns(models) {
  const dropdowns = {
    CHATGPT: document.getElementById('chatgpt-model'),
    CLAUDE: document.getElementById('claude-model'),
    GROQ: document.getElementById('groq-model'),
    GEMINI: document.getElementById('gemini-model')
  };

  Object.keys(dropdowns).forEach(llm => {
    const dropdown = dropdowns[llm];
    if (!dropdown) return;
    
    dropdown.innerHTML = '<option value="">Select model</option>';
    const filtered = models.filter(m => m.llm === llm);
    
    filtered.forEach(model => {
      const option = document.createElement('option');
      option.value = model.name;
      option.textContent = model.display_name;
      dropdown.appendChild(option);
    });
  });

  // Re-populate with saved values
  loadUserSettings();
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

  content.innerHTML = `

      <!-- Header -->
      <div class="text-center py-3">
        <div class="text-3xl mb-2">💬</div>

      <!-- Quick Support Options -->

        <button onclick="setContactCategory('bug')" class="card p-3 text-center hover:border-blue-300 transition-colors category-btn" data-category="bug">

        </button>

          <div class="text-xs font-medium">Feature Request</div>
        </button>
        <button onclick="setContactCategory('support')" class="card p-3 text-center hover:border-blue-300 transition-colors category-btn" data-category="support">
          <div class="text-xl mb-1">🆘</div>
          <div class="text-xs font-medium">Need Help</div>
        </button>
        <button onclick="setContactCategory('feedback')" class="card p-3 text-center hover:border-blue-300 transition-colors category-btn" data-category="feedback">
          <div class="text-xl mb-1">⭐</div>
          <div class="text-xs font-medium">Feedback</div>
        </button>
      </div>

      <!-- Contact Form -->

        <input type="hidden" id="contactCategory" value="general">
        
        <div>
          <label class="text-xs font-medium text-gray-700 mb-1 block">Your Email</label>
          <input type="email" id="contactEmail" required 
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors"

            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors resize-none"
            placeholder="Tell us more..."></textarea>
        </div>
        
        <button type="submit" id="contactSubmitBtn"
          class="w-full h-10 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors text-sm">

  `;

  document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    submitContactForm();
  });
}

/**
 * Set contact category and highlight button
 */
function setContactCategory(category) {
  document.getElementById('contactCategory').value = category;
  
  // Update button styles
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.classList.remove('border-blue-500', 'bg-blue-50');
  });
  
  const activeBtn = document.querySelector(`[data-category="${category}"]`);
  if (activeBtn) {
    activeBtn.classList.add('border-blue-500', 'bg-blue-50');
  }
  
  // Pre-fill subject based on category
  const subjects = {
    bug: '🐛 Bug Report: ',
    feature: '💡 Feature Request: ',
    support: '🆘 Help Needed: ',
    feedback: '⭐ Feedback: '
  };
  
  const subjectInput = document.getElementById('contactSubject');
  if (subjectInput && subjects[category]) {
    subjectInput.value = subjects[category];
    subjectInput.focus();
  }
}

/**
 * Submit contact form
 */
function submitContactForm() {
  const btn = document.getElementById('contactSubmitBtn');
  const originalText = btn.textContent;
  btn.textContent = 'Sending...';
  btn.disabled = true;
  
  const category = document.getElementById('contactCategory').value;
  const email = document.getElementById('contactEmail').value;
  const subject = document.getElementById('contactSubject').value;
  const message = document.getElementById('contactMessage').value;
  
  // Combine subject and message
  const fullMessage = `[${category.toUpperCase()}] ${subject}\n\n${message}`;

  google.script.run
    .withSuccessHandler(function() {
      showToast('Message sent! We\'ll get back to you soon 🎉', 'success');
      document.getElementById('contactForm').reset();
      btn.textContent = '✓ Sent!';
      btn.classList.remove('bg-blue-600');
      btn.classList.add('bg-green-600');
      
      setTimeout(() => {
        btn.textContent = originalText;
        btn.classList.remove('bg-green-600');
        btn.classList.add('bg-blue-600');
        btn.disabled = false;
      }, 2000);
    })
    .withFailureHandler(function(err) {
      showToast('Failed to send. Try emailing us directly.', 'error');
      btn.textContent = originalText;
      btn.disabled = false;
    })
    .submitContactForm(email, email, fullMessage);
}
</script>
