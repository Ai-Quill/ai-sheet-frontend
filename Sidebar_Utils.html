<script>
// ============================================
// INITIALIZATION
// ============================================

/**
 * Initialize sidebar on page load
 * Called from body onload
 * Default tab: Agent (the main feature)
 */
function initializeSidebar() {
  showAgent(); // Agent is the default - the main feature
  checkApiKeys();
  loadSubscriptionStatus(); // Load subscription info in header
  refreshIcons(); // Render Lucide icons in static header elements
}

// ============================================
// LUCIDE ICONS
// ============================================

/**
 * Refresh Lucide icons in the DOM.
 * Must be called after any dynamic HTML render that includes
 * <i data-lucide="icon-name"></i> elements.
 * 
 * Uses the Lucide vanilla JS library loaded via CDN.
 * Safe to call multiple times — it only processes un-rendered icons.
 */
function refreshIcons() {
  if (typeof lucide !== 'undefined' && lucide.createIcons) {
    lucide.createIcons();
  }
}

/**
 * Check if API keys are configured
 * Shows warning alert if keys are missing
 */
function checkApiKeys() {
  google.script.run.withSuccessHandler(function(settings) {
    const models = ['CHATGPT', 'CLAUDE', 'GROQ', 'GEMINI'];
    const missingKeys = models.filter(model => !settings[model] || !settings[model].apiKey);
    
    if (missingKeys.length > 0) {
      const alertDiv = document.createElement('div');
      alertDiv.className = 'alert alert-warning animate-in';
      alertDiv.innerHTML = `
        <p class="alert-title">⚠️ API Keys Missing</p>
        <p class="alert-description">Set up: ${missingKeys.join(', ')}. <a href="#" onclick="showSettings()" class="underline font-medium">Configure now</a></p>
      `;
      document.getElementById('content').prepend(alertDiv);
    }
  }).withFailureHandler(function(err) {
    console.error('Failed to check API keys:', err);
  }).getUserSettings();
}

// ============================================
// MENU MANAGEMENT
// ============================================

/**
 * Toggle sidebar width between wide (450px) and narrow (300px)
 * Calls backend to persist preference and refresh sidebar
 */
function toggleSidebarWidth() {
  const btn = document.getElementById('widthToggleBtn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader" class="icon-sm icon-spin"></i>';
    refreshIcons();
  }
  
  google.script.run
    .withSuccessHandler(function(isWide) {
      showToast(isWide ? 'Wide mode enabled' : 'Narrow mode enabled', 'success');
      // Sidebar will refresh automatically via showSidebar() in backend
    })
    .withFailureHandler(function(err) {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="maximize-2" class="icon-sm"></i>';
        refreshIcons();
      }
      showToast('Failed to toggle width', 'error');
    })
    .toggleSidebarWidth();
}

/**
 * Toggle the slide-out menu panel
 */
function toggleMenu() {
  const panel = document.getElementById('menuPanel');
  const overlay = document.getElementById('menuOverlay');
  const isOpen = !panel.classList.contains('translate-x-full');
  
  if (isOpen) {
    panel.classList.add('translate-x-full');
    overlay.classList.add('hidden');
  } else {
    panel.classList.remove('translate-x-full');
    overlay.classList.remove('hidden');
  }
}

// ============================================
// TAB MANAGEMENT
// ============================================

/**
 * Set the active tab in the tab bar
 * @param {string|null} tabId - Tab element ID to activate, or null to deactivate all
 */
function setActiveTab(tabId) {
  document.querySelectorAll('.tabs-trigger').forEach(t => t.classList.remove('active'));
  if (tabId) {
    document.getElementById(tabId)?.classList.add('active');
  }
}

// ============================================
// TOAST NOTIFICATIONS
// ============================================

/**
 * Show a toast notification
 * @param {string} message - Message to display
 * @param {string} type - 'default', 'success', or 'error'
 */
function showToast(message, type = 'default') {
  // Remove existing toast
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  // Create toast element
  const toast = document.createElement('div');
  const colors = {
    default: 'bg-gray-900 text-white',
    success: 'bg-emerald-600 text-white',
    error: 'bg-red-600 text-white'
  };
  
  toast.className = `toast ${colors[type] || colors.default}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  
  // Auto-dismiss after 3 seconds
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 200);
  }, 3000);
}

/**
 * Load subscription status and update the header bar
 */
function loadSubscriptionStatus() {
  google.script.run
    .withSuccessHandler(function(sub) {
      renderSubscriptionBar(sub);
    })
    .withFailureHandler(function(err) {
      console.error('Failed to load subscription:', err);
      // Show default on error (300 free requests)
      renderSubscriptionBar({ tier: 'free', remaining: 300, limit: 300, isUnlimited: false });
    })
    .getUserSubscription();
}

/**
 * Render subscription info in the header status bar
 * 
 * UX PHILOSOPHY:
 * - Unlimited tiers (Pro, OG/Legacy): Show clean tier badge only.
 *   Credit balances are an internal implementation detail — surfacing dollar
 *   amounts contradicts the "Unlimited" label and creates confusion.
 *   The system automatically uses user keys first and falls back to
 *   managed credits transparently — no user action needed.
 * - Free tier: Show remaining queries as a simple progress bar.
 *   This is the one tier where usage visibility drives behavior (upgrade).
 */
function renderSubscriptionBar(sub) {
  const container = document.getElementById('subscriptionStatus');
  if (!container) return;
  
  if (sub.tier === 'pro') {
    container.innerHTML = `
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1.5 px-2.5 py-1 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full shadow-sm">
          <i data-lucide="sparkles" style="width:11px;height:11px;color:white;stroke-width:2.5;"></i>
          <span class="text-white text-[11px] font-medium">Pro</span>
        </div>
        <span class="text-[11px] text-gray-500">Unlimited</span>
      </div>
      <button onclick="manageBilling()" class="text-[11px] text-blue-600 hover:underline flex items-center gap-1">
        <i data-lucide="settings" style="width:10px;height:10px;"></i> Manage
      </button>
    `;
    refreshIcons();
  } else if (sub.tier === 'legacy') {
    container.innerHTML = `
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1 px-2.5 py-1 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full shadow-sm">
          <i data-lucide="heart" style="width:11px;height:11px;color:white;stroke-width:2.5;fill:white;"></i>
          <span class="text-white text-[11px] font-medium">OG</span>
        </div>
        <span class="text-[11px] text-gray-600 font-medium">Unlimited</span>
      </div>
      <span class="text-[11px] text-purple-400 font-medium flex items-center gap-1">
        Early Adopter <i data-lucide="sparkles" style="width:10px;height:10px;color:#8b5cf6;"></i>
      </span>
    `;
    refreshIcons();
  } else {
    // Free tier — show usage progress (the only tier where this matters)
    const used = sub.limit - sub.remaining;
    const percentage = Math.min(100, (used / sub.limit) * 100);
    const barColor = percentage > 90 ? 'bg-red-500' : percentage > 75 ? 'bg-yellow-500' : 'bg-blue-500';
    
    // Show approximate free queries from managed credits if available
    const mc = sub.managedCredits || {};
    const approxQueriesLeft = mc.cap_usd > 0 ? Math.floor(mc.remaining_usd / 0.0003) : 0;
    const freeQueryHint = approxQueriesLeft > 0 
      ? `<span class="text-[11px] text-green-600 font-medium">+ ${approxQueriesLeft} free AI queries</span>` 
      : '';
    
    container.innerHTML = `
      <div class="flex-1 mr-2">
        <div class="flex items-center justify-between mb-0.5">
          <span class="text-[11px] font-medium text-gray-600">Free Plan</span>
          <span class="text-[11px] text-gray-500">${sub.remaining} of ${sub.limit} left</span>
        </div>
        <div class="h-1 bg-gray-200 rounded-full overflow-hidden">
          <div class="h-full ${barColor} transition-all rounded-full" style="width: ${percentage}%"></div>
        </div>
        ${freeQueryHint ? `<div class="mt-0.5">${freeQueryHint}</div>` : ''}
      </div>
      <button onclick="showSubscription()" class="text-[11px] px-2.5 py-1 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors font-medium whitespace-nowrap flex items-center gap-1">
        <i data-lucide="zap" style="width:10px;height:10px;color:white;stroke-width:2.5;"></i> Upgrade
      </button>
    `;
    refreshIcons();
  }
}

/**
 * Open billing portal for existing subscribers
 */
function manageBilling() {
  showToast('Opening billing portal...', 'default');
  
  google.script.run
    .withSuccessHandler(function(url) {
      if (url) {
        window.open(url, '_blank');
      } else {
        showToast('Failed to open billing portal', 'error');
      }
    })
    .withFailureHandler(function(err) {
      showToast('Error: ' + (err.message || 'Failed'), 'error');
    })
    .getBillingPortalUrl();
}

/**
 * Handle upgrade button click on subscription page
 */
function handleMainUpgrade() {
  const btn = document.getElementById('upgradeMainBtn');
  if (btn) {
    btn.textContent = 'Opening checkout...';
    btn.disabled = true;
  }
  
  google.script.run
    .withSuccessHandler(function(url) {
      if (url) {
        window.open(url, '_blank');
        showToast('Checkout opened in new tab', 'success');
      } else {
        showToast('Failed to create checkout', 'error');
      }
      
      if (btn) {
        btn.textContent = 'Subscribe Now';
        btn.disabled = false;
      }
    })
    .withFailureHandler(function(err) {
      showToast('Error: ' + (err.message || 'Failed'), 'error');
      if (btn) {
        btn.textContent = 'Subscribe Now';
        btn.disabled = false;
      }
    })
    .createCheckoutSession();
}

/**
 * Show notification (more versatile than toast)
 */
function showNotification(message, type = 'default') {
  showToast(message, type === 'warning' ? 'default' : type);
}
