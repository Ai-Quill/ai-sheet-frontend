  ============================================
  SIDEBAR_i18n.html - Internationalization Module
  ============================================
  
  Provides multi-language support for command parsing:
  - Detects user intent across 14 languages
  - Matches keywords for multi-column fill, translation, etc.
  - Identifies classification headers for format options
  - Provides localized classification options (Good/Bad/Neutral, Yes/No)
  
  Supported Languages:
  en (English), vi (Vietnamese), es (Spanish), fr (French),
  de (German), pt (Portuguese), zh (Chinese), ja (Japanese),
  ko (Korean), ru (Russian), ar (Arabic), hi (Hindi),
  th (Thai), id (Indonesian)
  
  Usage:
  - isFillAllCommand(input) - Check if user wants to fill all columns
  - isSingleColumnCommand(input) - Check if user specifies single column
  - isClassificationHeader(header) - Check if header is classification type
  - detectTaskType(input) - Detect task type (translate, summarize, etc.)
  - detectInputLanguage(input) - Auto-detect language of input
  - getClassificationOptions(lang) - Get "Good, Bad, Neutral" in language
  - getClassificationOptionsFromText(text) - Auto-detect language and get options
-->

/**
 * Check if input text matches any pattern for a given intent
 * @param {string} input - User's command (lowercase)
 * @param {string} intent - Intent key from I18N_PATTERNS
 * @returns {boolean} True if matches any pattern
 */
function matchesIntent(input, intent) {
  const patterns = I18N_PATTERNS[intent];
  if (!patterns) return false;
  
  for (const lang in patterns) {
    for (const pattern of patterns[lang]) {
      if (input.includes(pattern.toLowerCase())) {
        return true;
      }
    }
  }
  return false;
}

/**
 * Check if input matches fill all / multi-column intent
 * @param {string} input - User's command (lowercase)
 * @returns {boolean}
 */
function isFillAllCommand(input) {
  return matchesIntent(input, 'fillAll');
}

/**
 * Check if input indicates a single-column specific command
 * @param {string} input - User's command (lowercase)
 * @returns {boolean}
 */
function isSingleColumnCommand(input) {
  // Check for explicit column letter patterns like "to C", "in column D"
  const hasColumnLetter = (
    input.match(/\bto\s+(?:column\s+)?[a-z]\b/i) ||
    input.match(/\binto\s+(?:column\s+)?[a-z]\b/i) ||
    input.match(/\bput\s+(?:in\s+)?(?:column\s+)?[a-z]\b/i) ||
    input.match(/\bcolumn\s+[a-z]\s*$/i) ||
    input.match(/\bcột\s+[a-z]\b/i) ||
    input.match(/\b列[a-z]\b/i)
  );
  
  if (hasColumnLetter) return true;
  
  return matchesIntent(input, 'singleColumn');
}

/**
 * Detect task type from user command
 * @param {string} input - User's command (lowercase)
 * @returns {string} Task type: 'translate', 'summarize', 'sentiment', 'extract', 'classify', 'custom'
 */
function detectTaskType(input) {
  if (matchesIntent(input, 'translate')) return 'translate';
  if (matchesIntent(input, 'summarize')) return 'summarize';
  if (matchesIntent(input, 'sentiment')) return 'sentiment';
  if (matchesIntent(input, 'extract')) return 'extract';
  if (matchesIntent(input, 'classify')) return 'classify';
  return 'custom';
}

/**
 * Words that indicate the header expects detailed TEXT output, not classification
 * If a header contains these, it should NOT be treated as classification even
 * if it also contains classification-like words (e.g., "Phân tích đánh giá")
 */
const ANALYSIS_HEADER_PATTERNS = {
  en: ['analysis', 'summary', 'description', 'explain', 'detail', 'overview', 'report', 'insight'],
  vi: ['phân tích', 'tóm tắt', 'mô tả', 'giải thích', 'chi tiết', 'tổng quan', 'báo cáo', 'nhận định'],

  ko: ['분석', '요약', '설명', '상세', '보고서'],
};

/**
 * Check if header suggests detailed text output (not classification)
 */
function isAnalysisHeader(header) {
  const lower = header.toLowerCase();
  for (const lang in ANALYSIS_HEADER_PATTERNS) {
    for (const pattern of ANALYSIS_HEADER_PATTERNS[lang]) {
      if (lower.includes(pattern.toLowerCase())) {
        return true;
      }
    }
  }
  return false;
}

/**
 * Check if a column header indicates classification/sentiment type
 * Used to determine which columns should receive classification format options
 * 
 * STRICT MATCHING: Header must START with or BE a classification keyword.
 * Generic headers like "Relevance to Product Quality" should NOT match -
 * let the AI decide the appropriate output format based on context.
 * 
 * @param {string} header - Column header text
 * @returns {boolean}
 */
function isClassificationHeader(header) {
  const lower = header.toLowerCase().trim();
  
  // If it's an analysis-type header, it's NOT classification
  if (isAnalysisHeader(header)) {
    return false;
  }
  
  // STRICT matching: header must START with a classification keyword
  // This prevents false positives like "Relevance to Product Quality"
  const classificationPatterns = I18N_PATTERNS.classificationHeaders;
  if (!classificationPatterns) return false;
  
  for (const lang in classificationPatterns) {
    for (const pattern of classificationPatterns[lang]) {
      const patternLower = pattern.toLowerCase();
      // Match if header STARTS with keyword or IS the keyword (with possible suffix)
      if (lower.startsWith(patternLower) || 
          lower === patternLower ||
          lower.startsWith(patternLower + ' ')) {
        return true;
      }
    }
  }
  return false;
}

/**
 * Get all supported languages
 * @returns {string[]} Array of language codes
 */
function getSupportedLanguages() {
  return Object.keys(I18N_PATTERNS.fillAll);
}

/**
 * Detect the likely language of the input
 * @param {string} input - User's command
 * @returns {string} Language code (best guess)
 */
function detectInputLanguage(input) {
  // Simple heuristics based on character sets and common words
  if (/[\u4e00-\u9fff]/.test(input)) return 'zh'; // Chinese characters
  if (/[\u3040-\u309f\u30a0-\u30ff]/.test(input)) return 'ja'; // Japanese hiragana/katakana
  if (/[\uac00-\ud7af]/.test(input)) return 'ko'; // Korean hangul
  if (/[\u0600-\u06ff]/.test(input)) return 'ar'; // Arabic
  if (/[\u0900-\u097f]/.test(input)) return 'hi'; // Hindi Devanagari
  if (/[\u0e00-\u0e7f]/.test(input)) return 'th'; // Thai
  if (/[\u0400-\u04ff]/.test(input)) return 'ru'; // Cyrillic (Russian)
  
  // Check for Vietnamese diacritics
  if (/[àáảãạăằắẳẵặâầấẩẫậèéẻẽẹêềếểễệìíỉĩịòóỏõọôồốổỗộơờớởỡợùúủũụưừứửữựỳýỷỹỵđ]/i.test(input)) {
    return 'vi';
  }
  
  // Check for Spanish/Portuguese specific
  if (/[ñ¿¡]/i.test(input)) return 'es';
  if (/[ãõç]/i.test(input)) return 'pt';
  
  // Check for German specific
  if (/[äöüß]/i.test(input)) return 'de';
  
  // Check for French specific
  if (/[œæ]/i.test(input) || /\b(le|la|les|un|une|des|du|de)\b/i.test(input)) return 'fr';
  
  // Default to English
  return 'en';
}

/**
 * Get classification options for a given language
 * @param {string} lang - Language code (e.g., 'en', 'vi', 'es')
 * @returns {string} Comma-separated classification options
 */
function getClassificationOptions(lang) {
  return I18N_CLASSIFICATION_OPTIONS[lang] || I18N_CLASSIFICATION_OPTIONS.en;
}

/**
 * Get yes/no options for a given language
 * @param {string} lang - Language code
 * @returns {string} Comma-separated yes/no options
 */
function getYesNoOptions(lang) {
  return I18N_YESNO_OPTIONS[lang] || I18N_YESNO_OPTIONS.en;
}

/**
 * Get classification options based on detected language from text
 * Convenience function that combines language detection with option lookup
 * @param {string} text - Text to analyze for language detection
 * @returns {string} Comma-separated classification options in detected language
 */
function getClassificationOptionsFromText(text) {
  const lang = detectInputLanguage(text);
  return getClassificationOptions(lang);
}
